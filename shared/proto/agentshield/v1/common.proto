syntax = "proto3";

package agentshield.v1;

option go_package = "agentshield.dev/agentshield/shared/gen/go/agentshieldv1";

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string version = 2;
}

message Pagination {
  int32 limit = 1;
  int32 offset = 2;
}

message TimestampFilter {
  string from_rfc3339 = 1;
  string to_rfc3339 = 2;
}

message Empty {}
