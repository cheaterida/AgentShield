name: Build & Push Agent Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/agentshield-agent

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Go test (management-server)
        run: cd management-server && go test -race -count=1 ./...

      - name: Go test (gateway)
        run: cd gateway && go test -race -count=1 ./...

      - name: Go test (error-handler)
        run: cd error-handler && go test -race -count=1 ./...

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust test (agent-runtime non-Linux)
        run: cargo test -p agent-runtime --target x86_64-unknown-linux-gnu

      - name: Rust test (ebpf-common)
        run: cargo test -p agentshield-ebpf-common

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ML dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install dgl -f https://data.dgl.ai/wheels/torch-2.4/cpu/repo.html
          pip install -e "ml-pipeline/[dev]"

      - name: Python test (ml-pipeline)
        run: cd ml-pipeline && python -m pytest tests/ -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build agent-runtime (musl static)
        run: cargo build --release --target x86_64-unknown-linux-musl -p agent-runtime

      - name: Install Rust nightly (for eBPF)
        run: rustup toolchain install nightly --component rust-src

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Build eBPF bytecode
        run: cargo +nightly build --release --target bpfel-unknown-none -p agentshield-ebpf

      - name: Prepare Docker context
        run: |
          mkdir -p docker-context
          cp target/x86_64-unknown-linux-musl/release/agent-runtime docker-context/
          cp target/bpfel-unknown-none/release/agentshield-ebpf docker-context/
          cp agent-runtime/entrypoint.sh docker-context/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker-context/
          file: agent-runtime/Dockerfile.simple
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
